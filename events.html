<!DOCTYPE html>
<html>
<head>
  <title>Register for Event</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>Event Registration</header>
<div class="container" id="eventsContainer"></div>

<script type="module">
import { eventsList, registerEvent } from "./script.js";

const container = document.getElementById("eventsContainer");

eventsList.forEach((e,i)=>{
  const card = document.createElement("div");
  card.className="card";
  card.innerHTML=`<h3>${e}</h3><button id="btn${i}">Register</button>`;
  container.appendChild(card);
  document.getElementById(`btn${i}`).onclick = async ()=>{
    const success=await registerEvent(e);
    if(success) window.location.href="thankyou.html";
  };
});
</script>
</body>
</html>
