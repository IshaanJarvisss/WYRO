<!DOCTYPE html>
<html>
<head>
  <title>Events</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>Event List</header>

<div class="container" id="eventsContainer"></div>

<script type="module">
const events = [
  {name: "Speed Quiz", schedule: "Day 1, 2 PM", rules: "No cheating", about: "Fastest answers win"},
  {name: "Puzzle Hunt", schedule: "Day 2, 4 PM", rules: "Team up", about: "Solve puzzles"},
  {name: "Trivia Race", schedule: "Day 3, 3 PM", rules: "Answer quickly", about: "General knowledge"},
  {name: "Memory Challenge", schedule: "Day 4, 1 PM", rules: "Single player", about: "Test your memory"},
  {name: "Coding Sprint", schedule: "Day 5, 5 PM", rules: "Follow instructions", about: "Solve coding challenges"}
];

const container = document.getElementById("eventsContainer");

events.forEach((e, index) => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <h3>${e.name}</h3>
    <button onclick="showEvent(${index})">Event Info</button>
  `;
  container.appendChild(card);
});

window.showEvent = function(index) {
  const e = events[index];
  const infoCard = document.createElement("div");
  infoCard.className = "card";
  infoCard.innerHTML = `
    <h3>${e.name} Details</h3>
    <p><strong>Schedule:</strong> ${e.schedule}</p>
    <p><strong>Rules:</strong> ${e.rules}</p>
    <p><strong>About:</strong> ${e.about}</p>
    <button onclick="this.parentElement.remove()">Back</button>
  `;
  container.appendChild(infoCard);
};
</script>

</body>
</html>
