<!DOCTYPE html>
<html>
<head>
  <title>Participants</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>Participants</header>
<div class="container" id="participantsContainer"></div>

<script type="module">
import { eventsList, loadParticipants } from "./script.js";
const container=document.getElementById("participantsContainer");

eventsList.forEach(e=>{
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<h3>${e}</h3><div id="list_${e.replace(/ /g,"_")}"></div>`;
  container.appendChild(card);
  loadParticipants(e, `list_${e.replace(/ /g,"_")}`);
});
</script>
</body>
</html>
